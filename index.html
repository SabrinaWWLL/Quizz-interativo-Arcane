<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quem você é em Arcane</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="quiz-container">
    
        <div id="quiz">
            <div class="question">
                <p id="question-text">Pergunta 1: Qual é a sua matéria acadêmica favorita?</p>
                <button class="answer" id="answer1">Artes</button>
                <button class="answer" id="answer2">Educação física</button>
                <button class="answer" id="answer3">Engenharia</button>
                <button class="answer" id="answer4">Ciências exatas</button>
                <button class="answer" id="answer5">Ciência política</button>
            </div>
        </div>
        <div id="result" style="display:none;">
            <h2 class="biotitulo"><span id="personality-type"></span></h2>
            <div class="biografia-legenda">
            <p class="biolegenda">Tipo sanguíneo</p>
            <p class="biolegenda">Hobby</p>
        </div>
            <div class="biografia-header">
                <h2 class="biotexto"><span id="type-text"></span></h2>
                <h2 class="biotexto"><span id="brief-text"></span></h2>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
